study_name: liver_mri_cross_sequence_tumor_seg
task_type: tumor_segmentation

labels:
  background: 0
  tumor: 1

default_experiment: A
default_source_sequence: T2
default_source_bundle: P1
default_targets:
  - P1
  - P2
  - P3
  - P456
  - E_all

few_shot_targets:
  - E_all

few_shot_fractions:
  - 0.10
  - 0.20

target_bundles:
  P1:
    description: main plain MRI source bucket, merging T2 and T2WI as one family
    members:
      - T2
      - T2WI
  P2:
    description: plain MRI sequence 2
    members:
      - DWI
  P3:
    description: plain MRI sequence 3
    members:
      - ADC
  P456:
    description: remaining smaller or style-similar plain MRI sequences
    members:
      - T1
      - InPhase
      - OutPhase
      - C-pre
  E_all:
    description: all enhanced MRI sequences
    members:
      - ARTERIAL
      - PORTAL
      - DELAY

sequence_bundles:
  P1:
    - T2
    - T2WI
  P2:
    - DWI
  P3:
    - ADC
  P456:
    - T1
    - InPhase
    - OutPhase
    - C-pre
  E_all:
    - ARTERIAL
    - PORTAL
    - DELAY
  M1:
    - T2
    - T2WI
    - DWI
    - ADC
  M2:
    - T2
    - T2WI
    - DWI
    - ADC
    - T1
    - InPhase
    - OutPhase
    - C-pre
  M3:
    - T2
    - T2WI
    - DWI
    - ADC
    - T1
    - InPhase
    - OutPhase
    - C-pre
    - ARTERIAL
    - PORTAL
    - DELAY
  U1:
    - DWI
  U2:
    - ADC
  U3:
    - T1
    - InPhase
    - OutPhase
    - C-pre
  U4:
    - ARTERIAL
    - PORTAL
    - DELAY
  PLAIN_ALL:
    - T2
    - T2WI
    - DWI
    - ADC
    - T1
    - InPhase
    - OutPhase
    - C-pre
  ALL_SEQ:
    - T2
    - T2WI
    - DWI
    - ADC
    - T1
    - InPhase
    - OutPhase
    - C-pre
    - ARTERIAL
    - PORTAL
    - DELAY

experiments:
  A:
    description: train P1 only, test on P1/P2/P3/P456/E_all
    dataset_id: 311
    source_tag: A
    source_bundle: P1
    primary_target: P1
    targets: [P1, P2, P3, P456, E_all]
  M1:
    description: train on P1+P2+P3
    dataset_id: 312
    source_tag: M1
    source_bundle: M1
    targets: [P1, P2, P3, P456, E_all]
  M2:
    description: train on all plain MRI sequences
    dataset_id: 313
    source_tag: M2
    source_bundle: M2
    targets: [P1, P2, P3, P456, E_all]
  M3:
    description: train on all sequences
    dataset_id: 314
    source_tag: M3
    source_bundle: M3
    targets: [P1, P2, P3, P456, E_all]
  U1:
    description: train on P2 only
    dataset_id: 315
    source_tag: U1
    source_bundle: U1
    primary_target: P2
    targets: [P1, P2, P3, P456, E_all]
  U2:
    description: train on P3 only
    dataset_id: 316
    source_tag: U2
    source_bundle: U2
    primary_target: P3
    targets: [P1, P2, P3, P456, E_all]
  U3:
    description: train on P456 only
    dataset_id: 317
    source_tag: U3
    source_bundle: U3
    primary_target: P456
    targets: [P1, P2, P3, P456, E_all]
  U4:
    description: train on E_all only
    dataset_id: 318
    source_tag: U4
    source_bundle: U4
    primary_target: E_all
    targets: [P1, P2, P3, P456, E_all]

sequence_aliases:
  T2:
    - T2
  T2WI:
    - T2WI
    - T2W
  DWI:
    - DWI
  ADC:
    - ADC
  T1:
    - T1
  InPhase:
    - InPhase
    - INPHASE
    - IN_PHASE
  OutPhase:
    - OutPhase
    - OUTPHASE
    - OUT_PHASE
  C-pre:
    - C-pre
    - CPRE
    - PRE
    - PRECONTRAST
  ARTERIAL:
    - C+A
    - AP
    - ARTERIAL
  PORTAL:
    - C+V
    - VP
    - PORTAL
  DELAY:
    - C+Delay
    - HP
    - DELAY
    - HBP

label_keywords:
  - label
  - seg
  - mask
  - anno

file_suffixes:
  nii_gz: .nii.gz
  nii: .nii

nnunet:
  trainer: nnUNetTrainer
  configuration: 3d_fullres
  ensemble_folds: [0, 1, 2, 3, 4]

metrics:
  - dice
  - hd95
  - lesion_recall
  - lesion_precision
  - lesion_f1
  - volume_relative_error

self_audit:
  min_cases_per_target: 20
  max_vendor_missing_rate: 0.30
  check_label_values: true
  check_patient_leakage: true
  train_subset_values: [train, imagesTr]
  external_subset_values: [test, imagesTs]
